name: Update Stock Prices

on:
  schedule:
    # Run at 9:35 AM, 12:00 PM, and 4:05 PM ET (market hours) on weekdays
    # Times in UTC: 14:35, 17:00, 21:05
    - cron: "35 14 * * 1-5" # 9:35 AM ET
    - cron: "0 17 * * 1-5" # 12:00 PM ET
    - cron: "5 21 * * 1-5" # 4:05 PM ET
  workflow_dispatch: # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance

      - name: Update stock prices
        run: |
          python scripts/update_stock_prices.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/homepage-picks.json
          git diff --staged --quiet || git commit -m "Update stock prices [automated]"
          git push

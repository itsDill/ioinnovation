<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2be2b4"/>
      <stop offset="100%" style="stop-color:#00d475"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="200" fill="#2be2b4" opacity="0.05"/>
  <circle cx="1050" cy="530" r="250" fill="#00d475" opacity="0.05"/>
  
  <!-- Logo/Brand area -->
  <rect x="80" y="80" width="60" height="60" rx="12" fill="url(#accent-gradient)"/>
  <text x="160" y="125" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff">IO Innovation</text>
  
  <!-- Main headline -->
  <text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff">Finance Tools &amp;</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#accent-gradient)">Analytics</text>
  
  <!-- Subtitle -->
  <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#94a3b8">Free tools for smarter investing decisions</text>
  
  <!-- Feature badges -->
  <rect x="80" y="500" width="180" height="40" rx="20" fill="#2be2b4" opacity="0.15"/>
  <text x="110" y="527" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2be2b4">13F Tracker</text>
  
  <rect x="280" y="500" width="180" height="40" rx="20" fill="#2be2b4" opacity="0.15"/>
  <text x="310" y="527" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2be2b4">10-K Analyzer</text>
  
  <rect x="480" y="500" width="180" height="40" rx="20" fill="#2be2b4" opacity="0.15"/>
  <text x="510" y="527" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2be2b4">AI Signals</text>
  
  <!-- URL -->
  <text x="1120" y="590" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="end">ioinnovationfund.com</text>
</svg>
